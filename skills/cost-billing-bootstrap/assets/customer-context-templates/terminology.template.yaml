# Customer terminology overrides — generated by /cost-billing-bootstrap
# Other skills consult this file to use the customer's language rather than generic
# Moolabs/framework defaults.
#
# Read by every skill in the suite — PR descriptions, codemod comments, review surface
# labels, and adversarial-review findings all check terminology.yaml before emitting
# user-facing strings.

$schema: https://moolabs.com/schemas/customer-context/terminology/0.1.0
version: "0.1.0"
generated_at: ""

# Per-concept overrides. If the customer says "agent" where the suite defaults to
# "end-user", write { end_user: agent }. Skills then say "agent" in all customer-facing
# output for this integration.
overrides: {}
# Examples (overwrite based on customer's actual words):
#   end_user: "user"                       # the customer's customer; default "end-user"
#   output: "generation"                   # billable output; default "output"
#   output_event: "generation.delivered"   # the event_type to emit; default "<feature>.delivered"
#   unit_token: "credit"                   # if they bill in credits not tokens
#   unit_render: "image"                   # if they call renders "images"
#   tenant: "workspace"                    # customer's tenant terminology
#   feature_id: "product_slug"             # customer's feature identifier
#   request_id: "trace_id"                 # if they unify request and trace IDs

# Synonym groups — when the bootstrap finds multiple words for the same concept in the
# customer's docs/code, lists them here so the suite can match any of them.
synonyms: {}
# Examples:
#   completion: [generation, response, output, answer]
#   render: [image, picture, asset]
#   subscription: [plan, membership, seat]

# Customer-specific concepts the suite doesn't model by default. These are noted but
# not automatically wired — surfaced to /cost-billing-discovery as cell ④ candidates.
unique_concepts: []
# Examples:
#   - name: "promptbook"
#     definition: "A reusable prompt template; customers buy these as one-time purchases"
#     billable: true
#     unit: "purchase"

# When the customer's terminology contradicts itself (e.g., docs say "generation"
# but the pricing page says "completion"), bootstrap flags it here for review.
ambiguities: []
# Example:
#   - field: output
#     conflicting_terms: [generation, completion]
#     resolution: "ask user — likely 'generation' is end-user-facing and 'completion' is API-level"
