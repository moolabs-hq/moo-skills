# Integration + compliance config — generated by /cost-billing-bootstrap Category 7.
# Captures Moolabs-SDK wiring details + compliance constraints the suite must honor.
# Read by /cost-billing-instrument (codemod uses sdk_key_location for emitted code),
# /cost-billing-adversarial-review (PII rules drive the security risk class), and
# /cost-billing-discovery (multi-tenant shape affects entity-id attribution).

$schema: https://moolabs.com/schemas/customer-context/integration-config/0.1.0
version: "0.1.0"
generated_at: ""

# ──────────────────────────────────────────────────────────────────────
# Q7.1 — Moolabs SDK API key resolution
# ──────────────────────────────────────────────────────────────────────

sdk_key_location:
  kind: ""              # env-var | aws-secrets-manager | vault | 1password | doppler | infisical | dotenv | tbd
  reference: ""         # the resolution path, NOT the value
                        # examples:
                        #   env-var:              "MOOLABS_API_KEY"
                        #   aws-secrets-manager:  "prod/moolabs/api-key"
                        #   vault:                "secret/data/moolabs/prod"
                        #   1password:            "op://Engineering/Moolabs/credential"
                        #   doppler:              "MOOLABS_API_KEY (project=prod-api, config=prd)"
  rotation_policy: ""   # informational — e.g., "rotated quarterly", "static for life of contract"

# How the customer's code reads the key. Codemod uses this to emit the right
# resolution call (e.g., `os.environ["MOOLABS_API_KEY"]` vs
# `boto3.client('secretsmanager').get_secret_value(SecretId='prod/moolabs/api-key')`).
sdk_key_read_pattern: ""
# Examples:
#   "os.environ[\"MOOLABS_API_KEY\"]"
#   "secrets_client.get_secret_value(SecretId='prod/moolabs/api-key')['SecretString']"
#   "vault.read('secret/data/moolabs/prod')['data']['data']['api_key']"

# ──────────────────────────────────────────────────────────────────────
# Q7.2 — Region(s)
# ──────────────────────────────────────────────────────────────────────

regions: []
# Each region:
#   - id: ""              # "use1" | "apse1" | "euw1" | "other"
#     key_prefix: ""      # e.g., "sk_use1_" — informational, the SDK routes regionally itself
#     primary: true       # true for the main region; false for fallback/secondary
#     notes: ""

# ──────────────────────────────────────────────────────────────────────
# Q7.3 — Environments
# ──────────────────────────────────────────────────────────────────────

environments: []
# Each env:
#   - id: ""              # "dev" | "staging" | "prod" | "preview" | custom
#     sdk_key_location:   # override sdk_key_location above if env-specific
#       kind: ""
#       reference: ""
#     llm_provider: ""    # if the customer uses different LLMs per env (e.g., GPT-3.5 in dev, GPT-4 in prod)
#     notes: ""

# ──────────────────────────────────────────────────────────────────────
# Q7.4 — Multi-tenant shape
# ──────────────────────────────────────────────────────────────────────

multi_tenant:
  shape: ""             # single-tenant | multi-tenant-shared-db | multi-tenant-isolated-db | workspace-based | other
  tenant_id_field: ""   # the field name that identifies a tenant (e.g., "tenant_id", "workspace_id", "account_id")
  tenant_id_source: ""  # where the tenant id comes from in a request:
                        # examples: "JWT claim 'org_id'", "subdomain", "X-Tenant-Id header", "request.user.workspace"
  workspaces_per_account: ""  # for workspace-based: "1 typical, up to 10 max" — informational
  notes: ""

# ──────────────────────────────────────────────────────────────────────
# Q7.5 — Customer IP / data policy
# ──────────────────────────────────────────────────────────────────────

artifact_storage:
  review_specs_location: ""    # "in-repo" | "external" | "hybrid"
  review_specs_external_path: ""  # required if "external" or "hybrid"
  customer_context_location: ""   # "in-repo" | "external"
  customer_context_external_path: ""

compliance_regimes: []
# Examples: ["SOC2", "HIPAA", "GDPR", "FedRAMP-Moderate", "PCI-DSS-Level-1"]
# Each entry triggers downstream skill behavior:
#   HIPAA → strict PII guard, no PHI in span attributes, audit log of every codemod change
#   GDPR → right-to-erasure path documented; customer-context purgeable

# ──────────────────────────────────────────────────────────────────────
# Q7.6 — PII / regulated data exclusions
# ──────────────────────────────────────────────────────────────────────

pii_field_blocklist: []
# Regex or path patterns the codemod's PII guard MUST refuse to log.
# Examples:
#   - "request.user.email"
#   - "response.choices[].message.content"     # full prompt content
#   - "audio.transcript.text"
#   - "patient_id"
#   - "/^password|secret|api_key|bearer/i"     # regex
#   - "request.body.ssn"

phi_field_blocklist: []
# Same shape; specifically PHI under HIPAA. Codemod is even stricter here —
# refuses to emit if even an INDIRECT reference (a span attribute name) could leak PHI.

# ──────────────────────────────────────────────────────────────────────
# Notes from bootstrap
# ──────────────────────────────────────────────────────────────────────

llm_synthesis_notes: ""
# The LLM's prose explanation of how it parsed the integration config.
# Useful for /cost-billing-adversarial-review to audit the bootstrap output.

unresolved: []
# Items the customer marked as "TBD — please configure first". Bootstrap
# surfaces these on every downstream skill run as REQUIRED-RESOLVED-BEFORE-MERGE.
# Examples:
#   - "sdk_key_location.kind = tbd — customer needs to pick a secret store before codemod can run"
#   - "compliance_regimes = []  — customer is still drafting; revisit before go-live"
