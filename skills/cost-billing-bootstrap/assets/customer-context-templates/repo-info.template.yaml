# Customer repo info — generated by /cost-billing-bootstrap
# Read by /cost-billing-discovery (skips re-running repo_scan if this is fresh) and
# /cost-billing-instrument (template adapter selection per service).

$schema: https://moolabs.com/schemas/customer-context/repo-info/0.1.0
version: "0.1.0"
generated_at: ""
generator: cost-billing-bootstrap@0.1.0
scan_method: manifest-first      # manifest-first | extension-fallback

repo_root: ""                    # absolute path
repo_type: unknown               # polyrepo | monorepo | microservices | unknown

services: []
# Each service:
#   - path: ""                    # relative to repo_root
#     languages: []               # [python, typescript, go, ...]
#     manifests: []               # [pyproject.toml, package.json, go.mod, ...]
#     frameworks: []              # [fastapi, django, express, nestjs, ...]
#     existing_instrumentation: []  # [opentelemetry-api, datadog, sentry, openllmetry, helicone, ...]
#     existing_moolabs_sdk: null  # null | "moolabs" | "@moolabs/sdk" | etc.
#     build_command: ""           # detected from manifest (uv sync / npm install / go build)
#     test_command: ""            # detected from manifest (pytest / npm test / go test ./...)
#     hot_paths_guess: []         # files the bootstrap identified as latency-sensitive
#     notes: ""

ci_config:
  detected_systems: []           # [github-actions, gitlab-ci, circleci, jenkins]
  build_workflow_path: ""        # e.g. .github/workflows/ci.yml
  pr_test_command: ""            # how CI runs tests on a PR
  branch_naming_convention: ""   # e.g. "feat/*", "feature/*" — heuristic from existing branches

bootstrap_notes: ""
# Any free-form notes the bootstrap recorded — e.g. "monorepo with shared lib in ./packages"
# or "found a stray .moolabs/inventory/ from a prior abandoned integration".
