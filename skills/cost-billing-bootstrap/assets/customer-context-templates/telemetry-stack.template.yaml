# Customer telemetry/observability stack — generated by /cost-billing-bootstrap
# Read by /cost-billing-instrument to decide brownfield (extend existing spans) vs
# greenfield (introduce OTel + Moolabs SDK) per service.

$schema: https://moolabs.com/schemas/customer-context/telemetry-stack/0.1.0
version: "0.1.0"
generated_at: ""

primary_tracer: none             # opentelemetry | datadog | sentry | newrelic | custom | none
secondary: []                    # [openllmetry, helicone, langfuse, etc.]

mode: greenfield                 # brownfield (existing tracer detected) | greenfield (clean slate)

trace_context_provider: ""       # the API the codemod will use to get the current span:
                                 #   opentelemetry-api      → opentelemetry.trace.get_current_span()
                                 #   datadog-trace          → ddtrace.tracer.current_span()
                                 #   sentry-sdk             → sentry_sdk.get_current_span()
                                 #   custom                 → user-provided import path

existing_attributes_prefix: []
# Attribute prefixes already in use that the codemod must avoid colliding with.
# Examples: ["gen_ai.*", "helicone.*", "datadog.*"]

per_service_overrides: []
# When different services in the same repo use different tracers
# (e.g., legacy service on Datadog, new service on OTel).
#   - service_path: services/legacy-billing
#     primary_tracer: datadog
#     trace_context_provider: datadog-trace

trace_context_extraction_strategy: ""
# How the codemod gets request-correlation IDs from the framework's request context.
# Examples:
#   "fastapi: request.state.request_id (set by middleware xyz)"
#   "express: req.headers['x-request-id']"
#   "django: request.META['HTTP_X_REQUEST_ID']"

instrumentation_install_command: ""
# In greenfield mode, the command the codemod will recommend in the PR description
# (the codemod itself does NOT run it). Examples:
#   "pip install moolabs opentelemetry-instrumentation-fastapi"
#   "npm install moolabs @opentelemetry/api @opentelemetry/sdk-node"

notes: ""
