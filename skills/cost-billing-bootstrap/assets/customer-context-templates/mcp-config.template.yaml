# MCP + agent surface config — generated by /cost-billing-bootstrap Category 6.
# Captures which MCP servers the customer has configured and which the suite is
# permitted to use. Other skills consult this before reaching for fetch / web /
# search / vault / memory tools.

$schema: https://moolabs.com/schemas/customer-context/mcp-config/0.1.0
version: "0.1.0"
generated_at: ""

# Agent surface running this bootstrap + downstream skills.
agent_surface: ""     # claude-code | cursor | codex-cli | windsurf | gemini-cli | opencode | other
agent_surface_other: ""   # describe if 'other'

# LLM routing turns when this bootstrap ran.
active_llm:
  vendor: ""          # anthropic | openai | google | meta | other
  model_id: ""        # e.g. "claude-opus-4-7", "gpt-4o-2024-08-06", "gemini-1.5-pro"
  notes: ""

# Recommended reviewer model for /cost-billing-adversarial-review.
# Should be a DIFFERENT vendor from active_llm if possible (cross-model rule).
recommended_reviewer_model:
  vendor: ""
  model_id: ""
  rationale: ""       # why this choice (e.g., "GPT-4o is the customer's secondary; sufficient cross-model coverage")

# MCP server inventory — populate one entry per MCP the customer has configured.
mcps_available: []
# Each MCP:
#   - id: ""                      # name as it appears in the agent's MCP list
#     category: ""                # web-fetch | doc-index | code-search | memory | vault | observability | custom
#     prefer: false               # true if this is the customer's preferred MCP for its category
#     use_for: []                 # list of suite tasks this MCP is allowed to power
#                                 # examples: ["fetch-pricing-page", "ingest-product-docs",
#                                 #            "search-code-graph", "store-customer-context"]
#     notes: ""

# Hard restrictions — things the suite must NOT use MCPs for.
mcp_restrictions: []
# Examples:
#   - "Never fetch external URLs (air-gapped network policy)"
#   - "Never store customer code in claude-mem or any cross-session memory"
#   - "Never call MCPs from /cost-billing-instrument codemod context — codemod must be deterministic"
#   - "Never use the GitHub MCP to query private repos that aren't this customer's"
#   - "MCPs must not see anything matching regex /api_key|secret|password/"

# Per-task MCP selection — the bootstrap recommends WHICH MCP to use for each task.
# Other skills consult this before invoking any tool.
mcp_selection:
  fetch_external_url: ""           # which MCP id to use (e.g., "playwright")
  fetch_pricing_page: ""
  ingest_docs_folder: ""
  read_internal_notion: ""
  search_code_graph: ""
  resolve_secret_path: ""
  store_session_memory: ""

# Fallback when a needed MCP isn't available.
mcp_missing_fallback:
  fetch_external_url: ""           # "ask-user" | "skip-with-warning" | "use-local-curl" | "fail"
  ingest_docs_folder: ""           # "ask-user" | "fall-back-to-local-read" | "fail"
  search_code_graph: ""            # "ask-user" | "fall-back-to-grep" | "fail"
  resolve_secret_path: ""          # "ask-user" | "use-env-var" | "fail"
  store_session_memory: ""         # "ask-user" | "in-repo-file" | "skip"

llm_synthesis_notes: ""
# The LLM's prose explanation of how it parsed the MCP inventory and
# made selection recommendations. Useful for /cost-billing-adversarial-review.
