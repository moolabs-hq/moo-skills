# JSON-Schema (YAML form) for 01-finance.signed.yaml — Chain Stage 1 (CFO) handoff doc.

$schema: https://json-schema.org/draft/2020-12/schema
$id: https://moolabs.com/schemas/cost-billing-chain/finance/0.1.0
title: Cost+Billing Chain Stage 1 (Finance/CFO) signed handoff
type: object

required: [stage, chain_position, generated_at, input_chain, adversarial_review, signoff, pricing_model, compliance, deployment]
properties:
  stage: { type: string, const: finance }
  chain_position: { type: integer, const: 1 }
  generated_at: { type: string, format: date-time }
  generator: { type: string }
  agent_surface: { type: string }
  llm_used: { type: string }

  input_chain:
    type: array
    maxItems: 0    # finance is FIRST in the chain — no upstream input
    description: Always empty for the finance stage.

  adversarial_review:
    type: object
    required: [phase, verdict]
    properties:
      phase: { type: string, const: post-bootstrap-finance }
      verdict: { type: string, enum: [clean, clean-with-accepted-risks, blocked] }
      reviewer_model: { type: string }

  signoff:
    type: object
    required: [signed_by_role, signed_by_name, signed_at]
    properties:
      signed_by_role: { type: string, const: finance }
      signed_by_name: { type: string }
      signed_at: { type: string, format: date-time }
      notes: { type: string }

  pricing_model:
    type: object
    required: [primary_type, billable_units]
    properties:
      primary_type:
        type: string
        enum: [hybrid, subscription, usage, tiered, credit-wallet, enterprise-custom, other]
      sub_aspects:
        type: array
        items: { type: string }
      sources_of_truth:
        type: array
        items:
          type: object
          properties:
            type: { type: string, enum: [public_pricing_page, internal_doc, spreadsheet, config_file, sales_per_customer, code] }
            location: { type: string }
            authority: { type: string, enum: [primary, secondary, aspirational, contradictory] }
            freshness: { type: string, enum: [live, first_draft_brainstorm, stale, unknown] }
      billable_units:
        type: array
        minItems: 1
        items:
          type: object
          # classification REQUIRED as of 2026-05-25 (added after the SMS misclassification
          # case — see cost-billing-shared/v1-decisions-log.md). Without explicit
          # classification, downstream discovery cannot distinguish a vendor passthrough
          # (cost-only) from a customer-facing billable surface (usage or sibling-pair).
          required: [unit_id, label, classification]
          properties:
            unit_id: { type: string }      # short slug, e.g., "per_token_1k"
            label: { type: string }        # CFO's words, e.g., "completion priced per 1k tokens"
            price_usd: { type: number, minimum: 0 }
            per_what: { type: string }     # "1k tokens", "render", "minute", etc.
            classification:
              type: string
              enum: [customer_facing_billable, vendor_cogs_only, sibling_pair]
              description: |
                customer_facing_billable: customer pays us per X; vendor cost (if any)
                  is implementation detail. Discovery emits usage events for handlers
                  that produce X.
                vendor_cogs_only: vendor charges us per X but customer does NOT pay
                  us per X (e.g. Twilio passthrough where customer pays per-case
                  not per-SMS). Discovery emits cost-only events; does NOT emit a
                  usage event for the X-producing handler.
                sibling_pair: customer pays us per X AND vendor charges us per X
                  (one-to-one). Discovery emits BOTH a usage event and a paired
                  cost event.
            vendor_when_cogs:
              type: string
              description: |
                Required when classification=vendor_cogs_only. The vendor name +
                what the customer-facing unit IS instead.
                Example: "Twilio passthrough; customer pays per dunning case auto-managed."
            classification_justification:
              type: string
              description: |
                Required when classification=customer_facing_billable AND the unit_id
                names a known vendor surface (e.g. "per_sms", "per_email", "per_token").
                CFO must justify why this is NOT vendor_cogs_only — typically: "we set
                margin on top of vendor pass-through and the customer's contract is
                priced per unit, not per case."
      fair_usage_per_unit:
        type: object
        additionalProperties: true
      per_customer_custom:
        type: object
        additionalProperties: true
      bundles:
        type: array
        items: { type: object }

  compliance:
    type: object
    properties:
      # Finance owns the regulatory REGIMES only. The sensitive-data categories
      # they imply are enumerated at the CPO stage (02-cpo >
      # sensitive_data.categories) and translated to field paths at the engineer
      # stage (04-final > pii_field_blocklist). See shared/chain-handoff.md.
      regimes:
        type: array
        items: { type: string, enum: [SOC2, HIPAA, GDPR, FedRAMP-Moderate, FedRAMP-High, PCI-DSS, CCPA, none, other] }

  deployment:
    type: object
    # Finance owns region(s) + the COMMERCIAL tenancy fact only. The tenancy SHAPE
    # is captured at the CPO stage (02-cpo > multi_tenant.shape); the tenant_id
    # FIELD/SOURCE and the ENVIRONMENTS list at the engineer stage (04-final).
    # Finance neither knows the data model nor the code's field names (same
    # rationale as the compliance regime↔category↔field-path split).
    required: [regions, tenant_commercial]
    properties:
      regions:
        type: array
        items:
          type: object
          required: [id]
          properties:
            id: { type: string, enum: [use1, apse1, euw1, other] }
            key_prefix: { type: string }
            primary: { type: boolean }
      tenant_commercial:
        type: object
        required: [is_multi_tenant]
        properties:
          is_multi_tenant: { type: boolean }
          billed_per_tenant: { type: boolean }
