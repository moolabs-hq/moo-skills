# Customer pricing model — generated by /cost-billing-bootstrap
# Filled in from the customer's pricing page (or marked as unknown for enterprise-only customers).
# Read by /cost-billing-discovery (CFO Stage 1 pricing proposals) and /cost-billing-instrument
# (billable-unit selection per output).

$schema: https://moolabs.com/schemas/customer-context/pricing-model/0.1.0
version: "0.1.0"
generated_at: ""        # ISO-8601 UTC; filled by bootstrap
source_url: ""          # the pricing page URL the bootstrap read
source_fetched_at: ""   # ISO-8601 UTC
confidence: high        # high | medium | low (low when bootstrap couldn't fully parse)

plans: []
# Each plan:
#   - id: "free"
#     name: "Free"
#     monthly_usd: 0
#     annual_usd: 0
#     included_quota:
#       - unit: completion          # any terminology.yaml term
#         quantity: 100
#         period: month             # day | week | month | lifetime
#       - unit: render
#         quantity: 10
#         period: month
#     notable_limits: []           # e.g. ["1 user only", "rate-limited at 10 rpm"]
#   - id: pro
#     name: "Pro"
#     monthly_usd: 29
#     annual_usd: 290
#     included_quota:
#       - unit: completion
#         quantity: 10000
#         period: month
#   - id: enterprise
#     name: "Enterprise"
#     monthly_usd: null            # contact-sales pricing
#     notes: "Custom — contact sales"

overage_rates: []
# Each overage:
#   - unit: completion
#     price_usd: 0.002
#     after_quota: "pro.completion"
#   - unit: render
#     price_usd: 0.15
#     after_quota: "pro.render"

bundles: []
# Optional — combined-quota bundles (e.g., "100 completions + 10 renders" as one SKU).

notable_terms: []
# Free-form rules the bootstrap extracted but couldn't categorize.
# Examples:
#   - "Fair usage applies: 50k completions/month free per user"
#   - "GPU features count 2x against the credit pool"
#   - "First $10/mo waived for nonprofits"

unknown_or_ambiguous: []
# Things the bootstrap couldn't extract from the pricing page.
# Trigger a re-bootstrap with user clarification.
#   - "Pricing for the 'images' feature is not on the public page"
#   - "Annual discount stated as 'up to 20%' — unclear specific value"

llm_synthesis_notes: ""
# The LLM's prose explanation of how it parsed the pricing page.
# Useful for /cost-billing-adversarial-review to audit the bootstrap output.
