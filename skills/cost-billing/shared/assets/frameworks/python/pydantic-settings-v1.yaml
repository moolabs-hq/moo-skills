id: python-pydantic-v1-settings
language: python
framework: pydantic-settings-v1
detection:
  kind: regex
  import_signals: ["from\\s+pydantic\\s+import\\s+.*BaseSettings"]
  structural_signals: ["class\\s+\\w+\\(BaseSettings\\)"]
  detector: ""
  priority: 90
wiring:
  mode: modify
  accessor: "get_settings().moolabs_api_key.get_secret_value()"
emit:
  artifact_basename: moolabs_settings
  anchor: detected_config_dir
  import_rule: python_package
  fallback_dir: "app/services"
scripts: ["config_wire", "render_artifacts"]
