id: python-dynaconf
language: python
framework: dynaconf
detection:
  kind: regex
  import_signals: ["from\\s+dynaconf\\s+import\\s+Dynaconf"]
  structural_signals: ["Dynaconf\\("]
  detector: ""
  priority: 80
wiring:
  mode: stub
  accessor: ""
emit:
  artifact_basename: moolabs_settings
  anchor: detected_config_dir
  import_rule: python_package
  fallback_dir: "app/services"
scripts: ["config_wire", "render_artifacts"]
